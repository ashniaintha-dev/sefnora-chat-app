<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEFNORA CHAT APP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #ffffff; color: #000000; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #chat-container { width: 95%; max-width: 450px; background: #f9f9f9; border: 2px solid #d4af37; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        #header { background: linear-gradient(145deg, #d4af37, #b8860b); color: #000; padding: 20px; text-align: center; font-weight: 800; font-size: 1.4rem; letter-spacing: 1px; text-transform: uppercase; }
        #chat-box { height: 450px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: #d4af37; color: #000000; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #f0f0f0; color: #000000; border: 1px solid #d4af37; border-bottom-left-radius: 2px; }
        #input-area { display: flex; padding: 15px; background: #f9f9f9; border-top: 1px solid #eee; }
        #user-input { flex: 1; background: #ffffff; border: 1px solid #d4af37; color: #000000; padding: 12px; border-radius: 8px; outline: none; }
        #send-btn { background: #d4af37; border: none; padding: 10px 20px; margin-left: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; color: #000; }
        #footer { margin: 20px 0; font-size: 0.75rem; color: #555; text-align: center; line-height: 1.6; }
        #footer b { color: #d4af37; }
    </style>
</head>
<body>
<div id="chat-container">
    <div id="header">SEFNORA CHAT APP</div>
    <div id="chat-box"><div class="message ai">Hi! මම SEFNORA AI. ඕනෑම භාෂාවකින් මගෙන් ප්‍රශ්න අහන්න පුළුවන්.</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type message here...">
        <button id="send-btn">SEND</button>
    </div>
</div>
<div id="footer">Directed by <b>ASHNI AINTHA - CHICHI_GIRL</b><br>Powered by Google Gemini, GitHub & Google</div>
<script>
    const API_KEY = "AIzaSyARommHVKC4ibGHbVnIRT9ptuQYb6TrfM4"; 
    async function getResponse(prompt) {
        const sys = "You are SEFNORA AI. Respond in the language user speaks. If illegal/harmful, say 'සමාවෙන්න, මට ඒකට උත්තර දෙන්න බැහැ.'";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: sys + "\n\nUser: " + prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        } catch (e) { return "HY 🥺 සමාවෙන්න, සම්බන්ධතාවයේ දෝෂයක්."; }
    }
    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;
        append('user', text); input.value = '';
        const aiText = await getResponse(text);
        append('ai', aiText);
    };
    function append(sender, text) {
        const d = document.createElement('div'); d.className = `message ${sender}`; d.innerText = text;
        const box = document.getElementById('chat-box'); box.appendChild(d); box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
